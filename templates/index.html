{% extends 'base.html' %}


{% block head %}
    <title>Моите задачи</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/index.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
{% endblock %}


{% block body %}
<main>
    <div>
        <button onclick="Change_week(-1)">&lt;</button>
        <h2>
            <span id="week_month_title" style="margin-right: 2rem;"></span>
            <span id="week_year_title"></span>
        </h2>
        <button onclick="Change_week(1)">&gt;</button>
    </div>

    <div>
        <div id="day-monday" class="day-box">
            <h3>Понеделник <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>

        <div id="day-tuesday" class="day-box">
            <h3>Вторник <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>

        <div id="day-wednesday" class="day-box">
            <h3>Сряда <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>

        <div id="day-thursday" class="day-box">
            <h3>Четвъртък <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>
    </div>

    <div>
        <div id="day-friday" class="day-box">
            <h3>Петък <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>

        <div id="day-saturday" class="day-box">
            <h3>Събота <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>

        <div id="day-sunday" class="day-box">
            <h3>Неделя <span class="day-number"></span></h3>
            <div class="tasks-container" data-date=""></div>
            <div class="add-task-box display_none">
                <input type="text" placeholder="Име на задачата...">
                <button class="save-task-button" onclick="Save_task(this)">Добави</button>
                <button class="cancel-task-button" onclick="Hide_input(this)">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="add-task-button" onclick="Show_input(this)">+ Добави задача</button>
        </div>
    </div>
</main>

<script>
    function Show_input(button_to_disappear)
        {const box_to_appear=button_to_disappear.previousElementSibling;
        button_to_disappear.classList.add("display_none");
        box_to_appear.classList.remove("display_none");
        box_to_appear.querySelector("input").focus();}
    
    
    function Hide_input(button_to_disappear)
        {const box_to_hide=button_to_disappear.parentElement;
        const button_to_reappear=box_to_hide.nextElementSibling;
        box_to_hide.classList.add("display_none");
        button_to_reappear.classList.remove("display_none");
        box_to_hide.querySelector("input").value = "";}
    
    
    function Save_task(add_button)
        {const add_task_box=add_button.parentElement;
        const input=add_task_box.querySelector("input");
        const task_name=input.value.trim();
        
        if (task_name === "") 
                {return;}

        const task_container=add_task_box.parentElement.querySelector(".tasks-container");
        const task_date=task_container.getAttribute("data-date");

        fetch("/tasks", {method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: task_name, day_for: task_date})})
        .then((response) => response.json().then((data) => ({status: response.status, body: data})))
        .then((result) =>
            {if (result.status===201)
                {const task_html = `
                    <div class="task-box" data-id="${result.body.id}">
                        <div class="task-checkbox" onclick="Toggle_task(this)"></div>
                        <span class="task-text">${result.body.name}</span>
                        <button class="task-menu-button" onclick="Toggle_menu(this)">
                                <i class="fa-solid fa-ellipsis-v"></i>
                        </button>
                        <div class="task-menu display_none">
                            <div class="menu-options">
                                <button class="edit-task-button" onclick="Edit_task(this)">
                                    <i class="fa-solid fa-pen"></i> Редактирай
                                </button>
                                <button class="delete-task-button" onclick="Delete_task(this)">
                                    <i class="fa-solid fa-trash"></i> Изтрий
                                </button>
                            </div>
                            <button class="close-menu-button" onclick="Toggle_menu(this)">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
            `;
                task_container.insertAdjacentHTML("afterbegin", task_html);
                
                add_task_box.classList.add("display_none");
                add_task_box.nextElementSibling.classList.remove("display_none");
                input.value = "";}});}
    

    let current_offset=0;

    document.addEventListener("DOMContentLoaded", function()
        {Fetch_week_data();});

    function Change_week(direction)
        {current_offset += direction;
        Fetch_week_data();}

    function Fetch_week_data()
        {fetch("/week/data?offset=" + current_offset, {method: "GET"})
        .then((response) => response.json().then((data) => ({status: response.status, body: data})))
        .then((result) =>
            {if(result.status===200)
                {document.getElementById("week_month_title").innerText = result.body.month;
                document.getElementById("week_year_title").innerText = result.body.year + "г.";

                const days_keys=["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"];
                
                days_keys.forEach((day) =>
                    {const day_wrapper = document.getElementById("day-" + day) || document.getElementById("today-box");
                    const container=day_wrapper.querySelector(".tasks-container");
                    const num_span=day_wrapper.querySelector(".day-number");
                    
                    container.innerHTML = "";
                    
                    if(result.body.days[day]===result.body.today_iso)
                        day_wrapper.setAttribute("id", "today-box");
                    else
                        day_wrapper.setAttribute("id", "day-" + day);

                    num_span.innerText = result.body.days_numbers[day];
                    container.setAttribute("data-date", result.body.days[day]);

                    const existing_expired_text = day_wrapper.querySelector(".day-expired-text");
                    if(existing_expired_text) 
                        existing_expired_text.remove();

                    const add_button=day_wrapper.querySelector(".add-task-button");
                    const add_box=day_wrapper.querySelector(".add-task-box");
                    
                    if(result.body.days[day]<result.body.today_iso)
                        {if(add_button) add_button.style.display = "none";
                        if(add_box) add_box.style.display = "none";
                        container.insertAdjacentHTML("afterend", `<span class="day-expired-text">Денят е свършил</span>`);}
                    else
                        {if(add_button) add_button.style.display = "block";
                        if(add_box) add_box.classList.add("display_none");}});

                result.body.tasks.forEach((task) =>
                    {const day_container = document.querySelector(`[data-date="${task.day_for}"]`);
                    if(day_container)
                        {let css_class = "";
                        let onclick_handler = 'onclick="Toggle_task(this)"';
                        let cursor_style = "";
                        let menu_button = `
                            <button class="task-menu-button" onclick="Toggle_menu(this)">
                                <i class="fa-solid fa-ellipsis-v"></i>
                            </button>
                        `;

                        if(task.is_finished)
                            css_class="is-finished";

                        if(task.day_for<result.body.today_iso)
                            {onclick_handler = "";
                            menu_button = "";
                            cursor_style='style="cursor: not-allowed;"';
                            if(!task.is_finished)
                                css_class="is-not-finished";}

                        const task_html = `
                            <div class="task-box ${css_class}" data-id="${task.id}">
                                <div class="task-checkbox" ${onclick_handler} ${cursor_style}></div>
                                <span class="task-text">${task.name}</span>
                                ${menu_button}
                                <div class="task-menu display_none">
                                    <div class="menu-options">
                                        <button class="edit-task-button" onclick="Edit_task(this)">
                                            <i class="fa-solid fa-pen"></i> Редактирай
                                        </button>
                                        <button class="delete-task-button" onclick="Delete_task(this)">
                                            <i class="fa-solid fa-trash"></i> Изтрий
                                        </button>
                                    </div>
                                    <button class="close-menu-button" onclick="Toggle_menu(this)">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        
                        if(task.is_finished && task.day_for < result.body.today_iso)
                            day_container.insertAdjacentHTML("afterbegin", task_html);
                        else
                            day_container.insertAdjacentHTML("beforeend", task_html);}});}});}
    

    function Toggle_task(checkbox)
        {const task_box=checkbox.parentElement;
        const task_id=task_box.getAttribute("data-id");const task_container = task_box.parentElement;

        fetch("/tasks/" + task_id + "/checkbox", {method: "PATCH"})
            .then((response) => response.json().then((data) => ({status: response.status, body: data})))
            .then((result) =>
                    {if (result.status===200)
                            {task_box.classList.toggle("is-finished");
                            
                            if (task_box.classList.contains("is-finished"))
                                    {task_container.appendChild(task_box);}
                            else
                                    {task_container.insertBefore(task_box, task_container.firstChild);}}});}
    
    
    function Toggle_menu(element)
        {const task_box=element.closest(".task-box"); 
        const menu=task_box.querySelector(".task-menu");
        if(menu)
            menu.classList.toggle("display_none");}
    
    
    function Edit_task(button_edit_task)
        {const task_box=button_edit_task.closest(".task-box");
        const task_id=task_box.getAttribute("data-id");
        const task_text_element=task_box.querySelector(".task-text");
        const menu_button=task_box.querySelector(".task-menu-button");
        
        if (task_box.querySelector(".edit-task-input")) 
                return;

        const old_text=task_text_element.innerText;
        Toggle_menu(button_edit_task);

        task_text_element.innerHTML=`<input type="text" class="edit-task-input" value="${old_text}">`;
        const input=task_text_element.querySelector(".edit-task-input");
        
        setTimeout(() => 
                {input.focus();
                input.setSelectionRange(old_text.length, old_text.length);
                input.scrollLeft=input.scrollWidth;}, 1);

        menu_button.classList.add("display_none");

        const save_button=document.createElement("button");
        save_button.className="save-edit-button";
        save_button.innerText="Запази";
        task_box.insertBefore(save_button, task_box.querySelector(".task-menu"));

        save_button.onclick=function()
                {const new_text=input.value.trim();
                if(new_text==="") 
                        return;

                fetch("/tasks/"+task_id, {method: "PATCH",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({name: new_text})})
                .then((response) => 
                        {if(response.status===200) 
                                {task_text_element.innerText=new_text;
                                save_button.remove();
                                menu_button.classList.remove("display_none");}}).catch(()=>{});};}
    
    
    function Delete_task(button_delete_task)
        {const task_box=button_delete_task.closest(".task-box");
        const task_id=task_box.getAttribute("data-id");

        fetch("/tasks/" + task_id, { method: "DELETE" })
        .then((response) =>
            {if(response.status===204)
                task_box.remove();});}
</script>
{% endblock %}

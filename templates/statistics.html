{% extends 'base.html' %}

{% block head %}
    <title>Статистики</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/statistics.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block body %}
<main>
    
    <section>
        <div>
            <img src="{{ url_for('static', filename='pictures/fire.png') }}">
            <div>
                <span>Win Streak</span>
                <span id="win_streak_value"></span>
            </div>
        </div>

        <div>
            <img src="{{ url_for('static', filename='pictures/trophy.png') }}">
            <div>
                <span>Общо завършени</span>
                <span id="total_finished_value"></span>
            </div>
        </div>
    </section>

    <section>
        
        <div>
            <button id="prev_week_button">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            
            <div>
                <h2 id="week_range_title"></h2>
                <h3 id="weekly_balance_title"></h3>
                <p>
                    <span id="weekly_percent_value"></span>
                    <span class="divider">|</span>
                    <span id="balance_status"></span>
                </p>
            </div>
            
            <button id="next_week_button" disabled>
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div>
            <canvas id="weekly_chart"></canvas>
        </div>

    </section>

</main>
{% endblock %}

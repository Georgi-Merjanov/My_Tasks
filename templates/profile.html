{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Профил</title>
{% endblock %}

{% block body %}
<main id="profile-page">
    <div id="avatar-container">
        <input type="file" id="avatar-input" name="profile_picture" accept="image/*" style="display: none;">
        
        <label for="avatar-input">
            {% if(user.profile_picture) %}
                <img src="{{ url_for('static', filename='profile_pictures/' + user.profile_picture) }}" style="border: 0.25rem solid rgb(221, 221, 150);" alt="Профилна снимка">
            {% else %}
                <img src="{{ url_for('static', filename='pictures/camera.png')}}" class="placeholder">
            {% endif %}
            <span>Смени снимката</span>
        </label>

        {% if user.profile_picture %}
            <button id="delete-avatar-button">Премахни снимката</button>
        {% endif %}
    </div>

    <div id="info-container">
        <div class="info-row">
            <div>
                <label for="username">Потребителско име</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <button id="update-username-button">Смени</button>
        </div>
        <h3 id="message_username" class="display_none"></h3>

        <div class="info-row">
            <div>
                <label for="email">Имейл</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required>
            </div>
            <button id="update-email-button">Смени</button>
        </div>
        <h3 id="message_email" class="display_none"></h3>
    </div>

    <div id="security-container">
        <h3>Смяна на парола</h3>
        
        <div class="password-field-group">
            <label for="old_password">Стара парола</label>
            <input type="password" id="old_password" name="old_password" placeholder="Въведете старата парола" required minlength="10" autocomplete="new-password">
            <i class="fa-solid fa-eye toggle-password"></i>
        </div>

        <div class="password-field-group">
            <label for="new_password">Нова парола</label>
            <input type="password" id="new_password" name="new_password" placeholder="Въведете новата парола" required minlength="10">
            <i class="fa-solid fa-eye toggle-password"></i>
        </div>

        <div class="password-field-group">
            <label for="confirm_password">Повтори новата парола</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторете новата парола" required minlength="10">
            <i class="fa-solid fa-eye toggle-password"></i>
        </div>

        <h3 id="message_password" class="display_none"></h3>
        <button id="update-password-button">Смени паролата</button>
    </div>

    <div id="danger-container">
        <button id="delete-account-button">Изтрий моя профил</button>
        <button id="logout-button">Изход от профила</button>
    </div>
</main>

<script>
    document.querySelectorAll(".toggle-password").forEach((toggle_password) =>
        {toggle_password.addEventListener("click", () =>
            {const password_field = toggle_password.parentElement.querySelector("input");
            const type_to_change = password_field.getAttribute("type") === "password" ? "text" : "password";
            password_field.setAttribute("type", type_to_change);
            toggle_password.classList.toggle("fa-eye-slash");});});
    

    const avatar_input = document.getElementById("avatar-input");
    const delete_avatar_button = document.getElementById("delete-avatar-button");

    avatar_input.addEventListener("change", () =>
        {const file=avatar_input.files[0];
        if(!file) return;

        const form_data = new FormData();
        form_data.append("profile_picture", file);

        fetch("/users/{{ user.id }}/avatar", {method: "PATCH", body: form_data})
        .then((response) => response.json().then((data) =>
            {if(response.status===200)
                {window.location.reload();}
            else
                {alert(data.error);}}));});

    if(delete_avatar_button)
        {delete_avatar_button.addEventListener("click", () =>
            {fetch("/users/{{ user.id }}/avatar",
                {method: "PATCH",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({"profile_picture": null})})
            .then((response) => response.json().then((data) =>
                {if(response.status===200)
                    {window.location.reload();}
                else
                    {alert(data.error);}}));});}
    
    
    const username_input = document.getElementById("username");
    const update_username_button = document.getElementById("update-username-button");

    update_username_button.addEventListener("click", () =>
        {const message_box = document.getElementById("message_username");
        message_box.textContent="";
        message_box.className="display_none";
        
        const username_value=username_input.value;

        fetch("/users/{{ user.id }}/username",
            {method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({"username": username_value})})
        .then((response) => response.json().then((data) => ({status: response.status, body: data})))
        .then((result) =>
            {if(result.status===200)
                {message_box.textContent = result.body.success;
                message_box.classList.remove("display_none");
                message_box.classList.add("success");}
            
            if(result.status===400)
                {message_box.textContent = result.body.error;
                message_box.classList.remove("display_none");
                message_box.classList.add("error");}});});
    
    
    const email_input = document.getElementById("email");
    const update_email_button = document.getElementById("update-email-button");

    update_email_button.addEventListener("click", () =>
        {const message_box = document.getElementById("message_email");
        message_box.textContent="";
        message_box.className="display_none";
        
        const email_value=email_input.value;

        fetch("/users/{{ user.id }}/email", 
            {method: "PATCH", 
            headers: {"Content-Type": "application/json"}, 
            body: JSON.stringify({"email": email_value})})
        .then((response) => response.json().then((data) => ({status: response.status, body: data})))
        .then((result) =>
            {if(result.status===200)
                {message_box.textContent = result.body.success;
                message_box.classList.remove("display_none");
                message_box.classList.add("success");}
            else if(result.status===400)
                {message_box.textContent = result.body.error;
                message_box.classList.remove("display_none");
                message_box.classList.add("error");}});});
    
    
    const old_password_input = document.getElementById("old_password");
    const new_password_input = document.getElementById("new_password");
    const confirm_password_input = document.getElementById("confirm_password");
    const update_password_button = document.getElementById("update-password-button");

    update_password_button.addEventListener("click", () =>
        {const message_box = document.getElementById("message_password");
        message_box.textContent="";
        message_box.className="display_none";
        
        const old_password_value=old_password_input.value;
        const new_password_value=new_password_input.value;
        const confirm_password_value=confirm_password_input.value;

        fetch("/users/{{ user.id }}/password", 
            {method: "PATCH", 
            headers: {"Content-Type": "application/json"}, 
            body: JSON.stringify({
                "old_password": old_password_value,
                "new_password": new_password_value,
                "confirm_password": confirm_password_value})})
        .then((response) => response.json().then((data) => ({status: response.status, body: data})))
        .then((result) =>
            {if(result.status===200)
                {message_box.textContent=result.body.success;
                message_box.classList.remove("display_none");
                message_box.classList.add("success");
                
                old_password_input.value = "";
                new_password_input.value = "";
                confirm_password_input.value = "";
                
                document.querySelectorAll(".password-field-group").forEach((group) => {
                    const input=group.querySelector("input");
                    const icon=group.querySelector(".toggle-password");
                    
                    input.setAttribute("type", "password");
                    icon.classList.remove("fa-eye-slash");});}
            
            if(result.status===400)
                {message_box.textContent=result.body.error;
                message_box.classList.remove("display_none");
                message_box.classList.add("error");}});});
    
    
    document.getElementById("logout-button").addEventListener("click", (e) =>
        {fetch("/logout", {method: "POST"})
        .then((response) =>
            {if(response.status===204)
                {window.location.href="/login";}});});
    
    
    document.getElementById("delete-account-button").addEventListener("click", (e) =>
        {if(confirm('Сигурни ли сте, че искате да изтриете профила си? Всички задачи в него ще бъдат изтрити завинаги!'))
            {fetch("/users/{{user.id}}", {method: "DELETE"})
            .then((response) =>
                {if(response.status===204)
                    {window.location.href="/login";}});}});
</script>
{% endblock %}

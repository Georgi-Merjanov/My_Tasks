{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
    <title>Моят Профил</title>
{% endblock %}

{% block body %}
<main id="profile-page">
    <div id="avatar-container">
        <form action="{{ url_for('profile') }}" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="action" value="update_avatar">
            <input type="file" id="avatar-input" name="profile_picture" accept="image/*" style="display: none;" onchange="this.form.submit()">
            
            <label for="avatar-input">
                {% if(user.profile_picture) %}
                    <img src="{{ url_for('static', filename='profile_pictures/' + user.profile_picture) }}" style="border: 0.25rem solid rgb(221, 221, 150);" alt="Профилна снимка">
                {% else %}
                    <img src="{{ url_for('static', filename='pictures/camera.png')}}" class="placeholder">
                {% endif %}
                <span>Смени снимката</span>
            </label>
        </form>

        {% if user.profile_picture %}
        <form action="{{ url_for('profile') }}" method="POST">
            <input type="hidden" name="action" value="remove_avatar">
            <button type="submit" id="delete-avatar-btn">Премахни снимката</button>
        </form>
        {% endif %}
    </div>

    <div id="info-container">
        <form action="{{ url_for('profile') }}" method="POST">
            <input type="hidden" name="action" value="update_username">
            <div>
                <label for="username">Потребителско име</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <button type="submit">Смени</button>
        </form>
            {% if error %}
                <h3 style="color: #e74c3c;">
                    {{ error }}
                </h3>
            {% elif success %}
                <h3 style="color: #2ecc71;">
                    {{ success }}
                </h3>
            {% endif %}

        <form action="{{ url_for('profile') }}" method="POST">
            <input type="hidden" name="action" value="update_email">
            <div>
                <label for="email">Имейл</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required>
            </div>
            <button type="submit">Смени</button>
        </form>
    </div>

    <div id="security-container">
        <h3>Смяна на парола</h3>
        <form action="{{ url_for('profile') }}" method="POST">
            <input type="hidden" name="action" value="update_password">
            
            <div>
                <label for="old_password">Стара парола</label>
                <input type="password" id="old_password" name="old_password" placeholder="Въведете старата парола" required>
            </div>

            <div>
                <label for="new_password">Нова парола</label>
                <input type="password" id="new_password" name="new_password" placeholder="Въведете новата парола" required>
            </div>

            <div>
                <label for="confirm_password">Повтори новата парола</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторете новата парола" required>
            </div>

            <button type="submit">Смени паролата</button>
        </form>
    </div>

    <div id="danger-container">
        <form action="{{ url_for('logout') }}" method="POST" onsubmit="return confirm('Сигурни ли сте, че искате да изтриете профила си? Всички задачи в него ще бъдат изтрити завинаги!');">
            <input type="hidden" name="action" value="delete_account">
            <button type="submit">Изтрий моя профил</button>
        </form>

        <a href="{{ url_for('logout') }}">Изход от профила</a>
    </div>
</main>
{% endblock %}
